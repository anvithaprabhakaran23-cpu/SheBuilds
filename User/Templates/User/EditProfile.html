{% extends 'User/Header.html' %}
{% block content %}

<style>
    .profile-edit-wrapper {
        max-width: 950px;
        margin: 50px auto;
        padding: 0 20px;
    }

    .profile-edit-card {
        background: white;
        border-radius: 22px;
        padding: 45px;
        border: 1px solid #f1f5f9;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.04);
    }

    .profile-edit-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 35px;
        padding-bottom: 15px;
        border-bottom: 2px solid #f8fafc;
    }

    .profile-edit-header i {
        font-size: 26px;
        color: #3b82f6;
    }

    .profile-edit-header h2 {
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: .5px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 14px;
    }

    .form-control {
        width: 100%;
        padding: 12px 14px 12px 38px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        font-size: 15px;
        background: #f8fafc;
        transition: all .25s ease;
    }

    .form-control:focus {
        outline: none;
        background: white;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, .08);
    }

    .full {
        grid-column: 1 / -1;
    }

    .action-buttons {
        margin-top: 35px;
        display: flex;
        gap: 15px;
    }

    .btn {
        padding: 12px 28px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
        border: none;
        cursor: pointer;
        transition: .25s;
    }

    .btn-primary {
        background: #3b82f6;
        color: white;
        box-shadow: 0 5px 14px rgba(59, 130, 246, .25);
    }

    .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-2px);
    }

    .btn-secondary {
        background: #f1f5f9;
        color: #475569;
    }

    .btn-secondary:hover {
        background: #e2e8f0;
    }

    @media(max-width:768px) {

        .form-grid {
            grid-template-columns: 1fr;
        }

        .profile-edit-card {
            padding: 30px;
        }

    }
</style>


<div class="profile-edit-wrapper">

    <div class="profile-edit-card">

        <div class="profile-edit-header">
            <i class="fas fa-user-edit"></i>
            <h2>Edit Profile</h2>
        </div>

        <form action="" method="post">
            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group">
                    <label>Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-control" name="txt_name" value="{{editdata.user_name}}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" class="form-control" name="txt_email" value="{{editdata.user_email}}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Contact</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="text" class="form-control" name="txt_num" value="{{editdata.user_contact}}">
                    </div>
                </div>

                <div class="form-group full">
                    <label>Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" class="form-control" name="txt_address" value="{{editdata.user_address}}">
                    </div>
                </div>

            </div>

            <div class="action-buttons">

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    Update Profile
                </button>

                <a href="{% url 'User:MyProfile' %}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i>
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock content %}
