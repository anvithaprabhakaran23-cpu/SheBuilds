{% extends 'User/Header.html' %}
{% block content %}

<div class="page-container">

    <h3>💬 Submit Feedback</h3>

    <div class="card profile-card">
        <form action="" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Feedback</label>
                <textarea name="txt_feedback" rows="4" placeholder="Write your feedback here..." required></textarea>
            </div>
            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-reject">Cancel</button>
            </div>
        </form>
    </div>

</div>

<style>
.page-container {
    max-width: 900px;
    margin: 30px auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

h3 {
    text-align: center;
    color: #042c5c;
    margin-bottom: 20px;
}

.card.profile-card {
    background: #fff;
    padding: 20px 25px;
    margin-bottom: 25px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

.form-group textarea {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    outline: none;
    font-size: 1rem;
}

.form-group textarea:focus {
    border-color: #42a5f5;
    box-shadow: 0 0 5px rgba(66,165,245,0.3);
}

.form-buttons {
    text-align: center;
}

.btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
    color: #fff;
    cursor: pointer;
}

.btn-primary {
    background-color: #42a5f5;
}

.btn-primary:hover {
    background-color: #1e88e5;
}

.btn-reject {
    background-color: #f44336;
}

.btn-reject:hover {
    background-color: #d32f2f;
}

@media screen and (max-width: 600px) {
    .btn {
        font-size: 0.8rem;
        padding: 4px 8px;
    }
    .form-group textarea {
        font-size: 0.85rem;
    }
}
</style>

{% if msg %}
<script>
alert("{{ msg }}");
window.location="{% url 'User:Feedback' %}";
</script>
{% endif %}

{% endblock content %}
