{% extends 'Admin/Header.html' %}
{% block content %}

<style>
    .page-container{
        max-width:1000px;
        margin:30px auto;
        font-family: Arial, sans-serif;
    }

    .card{
        background:#ffffff;
        padding:20px;
        border-radius:8px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h3{
        margin-bottom:15px;
        color:#333;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th, td{
        padding:10px;
        border:1px solid #ddd;
        text-align:left;
        vertical-align:top;
        font-size:14px;
    }

    thead{
        background:#f3f4f6;
        font-weight:600;
    }

    tbody tr:hover{
        background:#fafafa;
    }
</style>

<div class="page-container">
    <div class="card">

        <h3>User Feedback</h3>

        <form action="" method="post">
            {% csrf_token %}

            <table>
                <thead>
                    <tr>
                        <th>Sl No</th>
                        <th>Name</th>
                        <th>Content</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody>
                    {% for i in feedback %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ i.user.user_name }}</td>
                        <td>{{ i.feedback_content }}</td>
                        <td>{{ i.feedback_date }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" style="text-align:center;color:#777;">
                            No feedback found
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </form>

    </div>
</div>

{% endblock content %}
