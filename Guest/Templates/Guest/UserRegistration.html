{% extends 'Guest/Header.html' %}
{% load static %}

{% block content %}
<div class="page-title dark-background" data-aos="fade">
  <div class="container position-relative">
    <h1>User Registration</h1>
    <p>Join the SheBuilds community today. Please fill in your details below.</p>
  </div>
</div>

<section class="registration-section section">
  <div class="container" data-aos="fade-up">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        
        <div class="card shadow-sm border-0 p-4 p-md-5">
          <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="row g-4">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label fw-bold">Full Name</label>
                  <input required type="text" name="txt_name" class="form-control" 
                         title="Name Allows Only Alphabets, Spaces and First Letter Must Be Capital" 
                         pattern="^[A-Z]+[a-zA-Z ]*$" placeholder="e.g. Jane Doe">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Email Address</label>
                  <input required type="email" name="txt_email" class="form-control" placeholder="name@example.com">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Contact Number</label>
                  <input required type="text" name="txt_num" class="form-control" 
                         pattern="[7-9]{1}[0-9]{9}" title="10 digits starting with 7, 8, or 9" placeholder="10-digit mobile number">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Profile Photo</label>
                  <input required type="file" name="file_photo" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input required type="password" name="txt_pass" class="form-control" 
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                           title="Must contain at least one number, one uppercase, one lowercase, and 8+ characters">
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label fw-bold">Address</label>
                  <input required type="text" name="txt_address" class="form-control" placeholder="House name/number, Street">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">District</label>
                  <select name="sel_district" id="sel_district" class="form-select">
                    <option value="">--select district--</option>
                    {% for i in district %}
                    <option value="{{i.id}}">{{i.district_name}}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Place</label>
                  <select name="sel_place" id="sel_place" class="form-select">
                    <option value="">--select place--</option>
                  </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Local Place</label>
                        <select name="sel_localplace" id="sel_localplace" class="form-select">
                          <option value="">--select--</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Authority</label>
                        <select name="sel_auth" id="sel_authward" class="form-select">
                          <option value="">--select--</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Ward</label>
                  <select name="sel_ward" id="sel_ward" class="form-select">
                    <option value="">--select--</option>
                  </select>
                </div>
              </div>
            </div>

            <hr class="my-4 text-muted">

            <div class="text-center">
              <button type="submit" class="btn btn-primary px-5 py-2 me-2" style="background: var(--accent-color); border: none;">Sign Up</button>
              <button type="reset" class="btn btn-outline-secondary px-5 py-2">Cancel</button>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</section>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    // DISTRICT -> PLACE
    $("#sel_district").change(function () {
        var did = $(this).val();
        var ur = "{% url 'Guest:ajaxplace' %}"
        $.ajax({
            url: ur,
            data: { did: did },
            success: function (data) {
                $("#sel_place").html(data);
            },
        });
    });

    // PLACE -> LOCAL PLACE
    $("#sel_place").change(function () {
        var pid = $(this).val();
        var ur = "{% url 'Authority:ajaxlocalplace' %}"
        $.ajax({
            url: ur,
            data: { pid: pid },
            success: function (data) {
                $("#sel_localplace").html(data);
            },
        });
    });

    // PLACE -> AUTHORITY
    $("#sel_place").change(function () {
        var pid = $(this).val();
        var ur = "{% url 'Guest:ajaxauthority' %}"
        $.ajax({
            url: ur,
            data: { pid: pid },
            success: function (data) {
                $("#sel_authward").html(data);
            },
        });
    });

    // AUTHORITY -> WARD
    $("#sel_authward").change(function () {
        var aid = $(this).val();
        var ur = "{% url 'Guest:ajaxauthorityward' %}"
        $.ajax({
            url: ur,
            data: { aid: aid },
            success: function (data) {
                $("#sel_ward").html(data);
            },
        });
    });
</script>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Guest:UserRegistration' %}"
</script>
{% endif %}

{% endblock content %}
