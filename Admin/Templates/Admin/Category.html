{% extends 'Admin/Header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post">
         {% csrf_token %} 
        <table border="2">
            <tr>
                <td>Category</td>
                <td><input required type="text" name="txt_name" id=""value="{{editdata.category_name}}"></td>
            </tr>
            <tr>
                <td><input type="submit" value="Add"></td>
              
            </tr>
        </table>
        <table border="2">
            <tr>
                <td>Sl no</td>
                <td>Category</td>
                <td>Action</td>
            </tr>
            {% for i in category %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.category_name}}</td>
                <td><a href="{% url 'Admin:delcategory' i.id %}" >Delete</a></td>
                <td><a href="{% url 'Admin:editcategory' i.id %}" >Edit</a></td>
            </tr>
             {% endfor %}
        </table>
    </form>
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:Category' %}"
</script>
{% endif %}

{% endblock content %}
