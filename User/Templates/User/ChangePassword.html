{% extends 'User/Header.html' %}
{% block content %}

<style>
    .password-wrapper {
        max-width: 700px;
        margin: 50px auto;
        padding: 0 20px;
    }

    .password-card {
        background: white;
        padding: 40px;
        border-radius: 22px;
        border: 1px solid #f1f5f9;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.04);
    }

    .password-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 2px solid #f8fafc;
    }

    .password-header i {
        font-size: 26px;
        color: #3b82f6;
    }

    .password-header h2 {
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
    }

    .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: .5px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 14px;
    }

    .form-control {
        width: 100%;
        padding: 12px 14px 12px 38px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        font-size: 15px;
        transition: .25s;
    }

    .form-control:focus {
        outline: none;
        background: white;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, .08);
    }

    .action-buttons {
        margin-top: 30px;
        display: flex;
        gap: 15px;
    }

    .btn {
        padding: 12px 26px;
        border-radius: 12px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: .25s;
    }

    .btn-primary {
        background: #3b82f6;
        color: white;
        box-shadow: 0 5px 14px rgba(59, 130, 246, .25);
    }

    .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-2px);
    }

    .btn-secondary {
        background: #f1f5f9;
        color: #475569;
    }

    .btn-secondary:hover {
        background: #e2e8f0;
    }
</style>


<div class="password-wrapper">

    <div class="password-card">

        <div class="password-header">
            <i class="fas fa-key"></i>
            <h2>Change Password</h2>
        </div>

        <form action="" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Old Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input required type="password" class="form-control" name="txt_oldpass">
                </div>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input required type="password" class="form-control" name="txt_newpass">
                </div>
            </div>

            <div class="form-group">
                <label>Re-Type Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-circle"></i>
                    <input required type="password" class="form-control" name="txt_pass">
                </div>
            </div>

            <div class="action-buttons">

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    Change Password
                </button>

                <button type="reset" class="btn btn-secondary">
                    <i class="fas fa-times"></i>
                    Cancel
                </button>

            </div>

        </form>

    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'User:ChangePassword' %}"
</script>
{% endif %}

{% endblock content %}
