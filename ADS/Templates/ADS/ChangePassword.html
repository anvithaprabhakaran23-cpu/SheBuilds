{% extends 'ADS/Header.html' %}
{% block content %}

<div class="page-container">

    <div class="card change-pass-card">
        <div class="card-header">
            <h2>Change Password</h2>
        </div>

        <form action="" method="post" class="change-pass-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="oldpass">Old Password</label>
                <div class="input-container">
                    <i class="fas fa-lock"></i>
                    <input id="oldpass" required type="password" name="txt_oldpass" placeholder="Enter old password">
                </div>
            </div>

            <div class="form-group">
                <label for="newpass">New Password</label>
                <div class="input-container">
                    <i class="fas fa-key"></i>
                    <input id="newpass" required type="password" name="txt_newpass" placeholder="Enter new password">
                </div>
            </div>

            <div class="form-group">
                <label for="repass">Re-Type Password</label>
                <div class="input-container">
                    <i class="fas fa-key"></i>
                    <input id="repass" required type="password" name="txt_pass" placeholder="Re-type new password">
                </div>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> Change Password
                </button>
                <button type="reset" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </form>
    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'ADS:ChangePassword' %}"
</script>
{% endif %}

<style>
/* Page Container */
.page-container {
    max-width: 500px;
    margin: 50px auto;
    padding: 0 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Card */
.card.change-pass-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 30px 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Card Header */
.card-header h2 {
    margin: 0 0 20px;
    color: #042c5c;
    text-align: center;
    font-size: 1.8rem;
    font-weight: 600;
}

/* Form Groups */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #042c5c;
}

/* Input Container */
.input-container {
    position: relative;
}

.input-container i {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #42a5f5;
}

.input-container input {
    width: 100%;
    padding: 10px 12px 10px 40px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    outline: none;
    font-size: 1rem;
    transition: border-color 0.2s;
}

.input-container input:focus {
    border-color: #42a5f5;
    box-shadow: 0 0 5px rgba(66,165,245,0.3);
}

/* Buttons */
.form-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background-color 0.2s;
}

.btn-primary {
    background-color: #42a5f5;
    color: white;
}

.btn-primary:hover {
    background-color: #1e88e5;
}

.btn-secondary {
    background-color: #cbd5e1;
    color: #042c5c;
}

.btn-secondary:hover {
    background-color: #b0bec5;
}
</style>

{% endblock content %}
