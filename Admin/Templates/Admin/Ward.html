{% extends 'Admin/Header.html' %}
{% block content %}

<style>
    .page-container{
        max-width:900px;
        margin:30px auto;
        font-family: Arial, sans-serif;
    }

    .card{
        background:#ffffff;
        padding:22px;
        border-radius:8px;
        box-shadow:0 4px 10px rgba(0,0,0,0.08);
        margin-bottom:20px;
    }

    h4{
        margin-bottom:15px;
        color:#333;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th, td{
        padding:10px;
        border:1px solid #ddd;
        font-size:14px;
        vertical-align:middle;
    }

    thead{
        background:#f3f4f6;
        font-weight:600;
    }

    input[type="text"]{
        width:100%;
        padding:8px 10px;
        border:1px solid #ccc;
        border-radius:4px;
    }

    .btn{
        padding:8px 16px;
        border:none;
        border-radius:4px;
        cursor:pointer;
        font-size:14px;
    }

    .btn-primary{
        background:#0d6efd;
        color:#fff;
    }

    .btn-danger{
        background:#dc3545;
        color:#fff;
        text-decoration:none;
        padding:5px 10px;
        border-radius:4px;
        font-size:13px;
    }

    tbody tr:hover{
        background:#fafafa;
    }
</style>

<div class="page-container">

    <!-- Add Ward -->
    <div class="card">
        <h4>Add Ward</h4>

        <form action="" method="post">
            {% csrf_token %}

            <table>
                <tr>
                    <td style="width:150px;">Ward</td>
                    <td>
                        <input type="text" name="txt_ward" required>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </td>
                </tr>
            </table>

        </form>
    </div>


    <!-- Ward List -->
    <div class="card">
        <h4>Ward List</h4>

        <table>
            <thead>
                <tr>
                    <th style="width:80px;">Sl No</th>
                    <th>Ward</th>
                    <th style="width:120px;">Action</th>
                </tr>
            </thead>

            <tbody>
                {% for i in ward %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i.ward_number }}</td>
                    <td>
                        <a href="{% url 'Admin:delward' i.id %}" 
                           class="btn-danger"
                           onclick="return confirm('Delete this ward?')">
                            Delete
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" style="text-align:center;color:#777;">
                        No wards found
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>


{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Admin:Ward' %}"
</script>
{% endif %}

{% endblock content %}
