{% extends 'User/Header.html' %}
{% block content %}

<div class="page-container">

    <h3>🎲 Chit Lottery Result</h3>

    {% if members %}
    <div class="card profile-card">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Member Name</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for i in members %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i.member.user.user_name }}</td>
                    <td>{{ i.chitmembers_date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <p>No lottery results found.</p>
    {% endif %}

</div>

<style>
.page-container {
    max-width: 900px;
    margin: 30px auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

h3 {
    text-align: center;
    color: #042c5c;
    margin-bottom: 20px;
}

.card.profile-card {
    background: #fff;
    padding: 20px 25px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.styled-table {
    width: 100%;
    border-collapse: collapse;
}

.styled-table th,
.styled-table td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #e2e8f0;
}

.styled-table th {
    background-color: #f1f5f9;
    color: #042c5c;
    font-weight: 600;
}

@media screen and (max-width: 600px) {
    .styled-table th, .styled-table td {
        font-size: 0.85rem;
        padding: 6px;
    }
}
</style>

{% endblock content %}
